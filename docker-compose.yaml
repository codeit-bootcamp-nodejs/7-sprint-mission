version: '3.8'
name: panda-market-sprint11

services:
  db:
    image: postgres:16-alpine
    container_name: sprint11-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pandamarket
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panda-market-app
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pandamarket?schema=public
      - JWT_ACCESS_TOKEN_SECRET=test_secret_key_123
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./public:/app/public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
