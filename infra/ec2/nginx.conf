server {
    # HTTP의 기본 포트인 80번 포트로 들어오는 요청을 받음
    listen 80; 

    # 도메인 설정: 요청을 받을 서버 이름을 지정
    # '-'는 특정 도메인이 지정되지 않은 모든 요청을 이 블록에서 처리한다는 뜻
    server_name _;

    # 업로드 용량 제한: 클라이언트가 보낼 수 있는 파일의 최대 크기 지정
    client_max_body_size 5M;

    # 경로 설정: '/' 즉, 모든 URL 경로로 들어오는 요청에 대해 아래 규칙을 적용
    location / {
        # 전달 대상: nginx로 들어온 요청을 실제로 처리할 내부 서버 주소를 지정(현재 내부 서버는 3000번 포트)
        proxy_pass http://localhost:3000;

        # 프로토콜 버전: 통신 시 사용할 HTTP 버전을 1.1로 고정 WebSocket을 사용하기 위한 버전 
        proxy_http_version 1.1; 

        # 프로토콜 전환: 클라이언트가 HTTP에서 프로토콜 전환을 요청할 때(예: 소켓 연결)
        # 이를 가로막지 않고 전달하기 위해 헤더를 설정. (Socket.io 구현 시 매우 중요)
        proxy_set_header Upgrade $http_upgrade;

        # 연결 상태 설정: 위 upgrade 헤더와 짝을 이루는 설정으로,
        # 연결을 끊지 않고 프로토콜을 전환(Upgrade) 상태로 유지하겠다는 선언 
        proxy_set_header Connection 'upgrade';

        # 호스트 정보 전달: 클라이언트가 실제 브라우저 주소창에 친 주소 정보를 노드 서버에 그대로 전달.
        # 서버가 본인의 실제 주소를 인식해야 할 때 사용
        proxy_set_header Host $host;

        # 캐시 우회: 실시간 통신의 경우, Nginx가 중간에
        # 예전 데이터를 보여주지(캐싱하지) 않고 즉시 노드 서버로 전달하도록 설정
        proxy_cache_bypass $http_upgrade;
    }
} 