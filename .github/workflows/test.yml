name: Run Tests

on:
  pull_request:
    branches:
      - main
      - sprint10

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: panda-market-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/panda-market-test
      JWT_ACCESS_TOKEN_SECRET: test-access-secret
      JWT_REFRESH_TOKEN_SECRET: test-refresh-secret
      NODE_ENV: test

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 패키지 설치
        run: npm install

      - name: Prisma 마이그레이션
        run: npx prisma migrate deploy

      - name: 테스트 실행
        run: npm test
